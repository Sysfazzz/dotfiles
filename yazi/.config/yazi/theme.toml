# : Manager [[[

[mgr]
cwd = { fg = "#e2e2e9" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#f578f2", bg = "#f578f2" }
marker_cut      = { fg = "#fcd7fb", bg = "#fcd7fb" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#dfbbde", bg = "#dfbbde" }

# Count
count_copied   = { fg = "#2a132d", bg = "#fcd7fb" }
count_cut      = { fg = "#2a132d", bg = "#fcd7fb" }
count_selected = { fg = "#122f60", bg = "#dfbbde" }

# Border
border_symbol = "│"
border_style  = { fg = "#aec6ff" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#aec6ff", bold = true, bg = "#121318" }
inactive  = { fg = "#bfc6dc", bg = "#121318" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#aec6ff", fg = "#122f60", bold = true }
normal_alt  = { bg = "#44474f", fg = "#c5c6d0" }

# Select mode
select_main = { bg = "#bfc6dc", fg = "#293041", bold = true }
select_alt  = { bg = "#44474f", fg = "#c5c6d0" }

# Unset mode
unset_main = { bg = "#dfbbde", fg = "#402843", bold = true }
unset_alt  = { bg = "#44474f", fg = "#c5c6d0" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#5c6ea6" }
perm_write = { fg = "#ae53ac" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#f149ed" }
perm_sep   = { fg = "#3f70ff" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#aec6ff", bg = "#38393e" }
progress_error  = { fg = "#ffb4ab", bg = "#38393e" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#38393e" }
cand = { fg = "#aec6ff" }
rest = { fg = "#122f60" }
desc = { fg = "#e2e2e9" }
separator = " ▶ "
separator_style = { fg = "#e2e2e9" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#dfbbde" }
title_warn  = { fg = "#aec6ff" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#aec6ff" }
active = { fg = "#dfbbde", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#aec6ff" }
value  = { fg = "#e2e2e9" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#aec6ff", bg = "#122f60" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#aec6ff" }
title   = {}
hovered = { fg = "#fcd7fb", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#e2e2e9" }
run    = { fg = "#e2e2e9" }
footer = { fg = "#293041", bg = "#bfc6dc" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#e2e2e9" },
    { url = "*/", fg = "#aec6ff" },
]

# : ]]]