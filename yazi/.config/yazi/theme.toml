# : Manager [[[

[mgr]
cwd = { fg = "#e2e2e9" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#ea77f8", bg = "#ea77f8" }
marker_cut      = { fg = "#f9d8fd", bg = "#f9d8fd" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#dcbce1", bg = "#dcbce1" }

# Count
count_copied   = { fg = "#28132f", bg = "#f9d8fd" }
count_cut      = { fg = "#28132f", bg = "#f9d8fd" }
count_selected = { fg = "#08305f", bg = "#dcbce1" }

# Border
border_symbol = "│"
border_style  = { fg = "#a9c7ff" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#a9c7ff", bold = true, bg = "#111318" }
inactive  = { fg = "#bdc7dc", bg = "#111318" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#a9c7ff", fg = "#08305f", bold = true }
normal_alt  = { bg = "#44474e", fg = "#c4c6cf" }

# Select mode
select_main = { bg = "#bdc7dc", fg = "#283141", bold = true }
select_alt  = { bg = "#44474e", fg = "#c4c6cf" }

# Unset mode
unset_main = { bg = "#dcbce1", fg = "#3e2845", bold = true }
unset_alt  = { bg = "#44474e", fg = "#c4c6cf" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#5972a7" }
perm_write = { fg = "#a552b2" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#e346f6" }
perm_sep   = { fg = "#3d7bff" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#a9c7ff", bg = "#37393e" }
progress_error  = { fg = "#ffb4ab", bg = "#37393e" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#37393e" }
cand = { fg = "#a9c7ff" }
rest = { fg = "#08305f" }
desc = { fg = "#e2e2e9" }
separator = " ▶ "
separator_style = { fg = "#e2e2e9" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#dcbce1" }
title_warn  = { fg = "#a9c7ff" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#a9c7ff" }
active = { fg = "#dcbce1", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#a9c7ff" }
value  = { fg = "#e2e2e9" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#a9c7ff", bg = "#08305f" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#a9c7ff" }
title   = {}
hovered = { fg = "#f9d8fd", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#e2e2e9" }
run    = { fg = "#e2e2e9" }
footer = { fg = "#283141", bg = "#bdc7dc" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#e2e2e9" },
    { url = "*/", fg = "#a9c7ff" },
]

# : ]]]