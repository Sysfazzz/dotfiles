# : Manager [[[

[mgr]
cwd = { fg = "#e6e3d5" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#72d4a7", bg = "#72d4a7" }
marker_cut      = { fg = "#c0ecd8", bg = "#c0ecd8" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#a4d0bc", bg = "#a4d0bc" }

# Count
count_copied   = { fg = "#002116", bg = "#c0ecd8" }
count_cut      = { fg = "#002116", bg = "#c0ecd8" }
count_selected = { fg = "#323200", bg = "#a4d0bc" }

# Border
border_symbol = "│"
border_style  = { fg = "#cccb76" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#cccb76", bold = true, bg = "#14140c" }
inactive  = { fg = "#cac8a4", bg = "#14140c" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#cccb76", fg = "#323200", bold = true }
normal_alt  = { bg = "#48473a", fg = "#cac7b6" }

# Select mode
select_main = { bg = "#cac8a4", fg = "#323218", bold = true }
select_alt  = { bg = "#48473a", fg = "#cac7b6" }

# Unset mode
unset_main = { bg = "#a4d0bc", fg = "#0b372a", bold = true }
unset_alt  = { bg = "#48473a", fg = "#cac7b6" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#87844e" }
perm_write = { fg = "#4b9071" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#4ac98f" }
perm_sep   = { fg = "#b8b726" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#cccb76", bg = "#3a3930" }
progress_error  = { fg = "#ffb4ab", bg = "#3a3930" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3a3930" }
cand = { fg = "#cccb76" }
rest = { fg = "#323200" }
desc = { fg = "#e6e3d5" }
separator = " ▶ "
separator_style = { fg = "#e6e3d5" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#a4d0bc" }
title_warn  = { fg = "#cccb76" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#cccb76" }
active = { fg = "#a4d0bc", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#cccb76" }
value  = { fg = "#e6e3d5" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#cccb76", bg = "#323200" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#cccb76" }
title   = {}
hovered = { fg = "#c0ecd8", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#e6e3d5" }
run    = { fg = "#e6e3d5" }
footer = { fg = "#323218", bg = "#cac8a4" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#e6e3d5" },
    { url = "*/", fg = "#cccb76" },
]

# : ]]]