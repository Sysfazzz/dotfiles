# : Manager [[[

[mgr]
cwd = { fg = "#f1dedd" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#ffb841", bg = "#ffb841" }
marker_cut      = { fg = "#ffdea7", bg = "#ffdea7" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#e2c28c", bg = "#e2c28c" }

# Count
count_copied   = { fg = "#271900", bg = "#ffdea7" }
count_cut      = { fg = "#271900", bg = "#ffdea7" }
count_selected = { fg = "#571e1c", bg = "#e2c28c" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffb3ae" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#ffb3ae", bold = true, bg = "#1a1111" }
inactive  = { fg = "#e7bdb9", bg = "#1a1111" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#ffb3ae", fg = "#571e1c", bold = true }
normal_alt  = { bg = "#534342", fg = "#d8c2c0" }

# Select mode
select_main = { bg = "#e7bdb9", fg = "#442927", bold = true }
select_alt  = { bg = "#534342", fg = "#d8c2c0" }

# Unset mode
unset_main = { bg = "#e2c28c", fg = "#402d04", bold = true }
unset_alt  = { bg = "#534342", fg = "#d8c2c0" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#c05247" }
perm_write = { fg = "#aa7b2b" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#ffa50e" }
perm_sep   = { fg = "#ff4c3e" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#ffb3ae", bg = "#423736" }
progress_error  = { fg = "#ffb4ab", bg = "#423736" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#423736" }
cand = { fg = "#ffb3ae" }
rest = { fg = "#571e1c" }
desc = { fg = "#f1dedd" }
separator = " ▶ "
separator_style = { fg = "#f1dedd" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#e2c28c" }
title_warn  = { fg = "#ffb3ae" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#ffb3ae" }
active = { fg = "#e2c28c", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffb3ae" }
value  = { fg = "#f1dedd" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#ffb3ae", bg = "#571e1c" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#ffb3ae" }
title   = {}
hovered = { fg = "#ffdea7", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#f1dedd" }
run    = { fg = "#f1dedd" }
footer = { fg = "#442927", bg = "#e7bdb9" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#f1dedd" },
    { url = "*/", fg = "#ffb3ae" },
]

# : ]]]