# : Manager [[[

[mgr]
cwd = { fg = "#e0e3e8" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#b576ff", bg = "#b576ff" }
marker_cut      = { fg = "#ecdcff", bg = "#ecdcff" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#d0bfe7", bg = "#d0bfe7" }

# Count
count_copied   = { fg = "#211634", bg = "#ecdcff" }
count_cut      = { fg = "#211634", bg = "#ecdcff" }
count_selected = { fg = "#003450", bg = "#d0bfe7" }

# Border
border_symbol = "│"
border_style  = { fg = "#97ccf9" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#97ccf9", bold = true, bg = "#101417" }
inactive  = { fg = "#b8c8d9", bg = "#101417" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#97ccf9", fg = "#003450", bold = true }
normal_alt  = { bg = "#41474d", fg = "#c1c7ce" }

# Select mode
select_main = { bg = "#b8c8d9", fg = "#22323f", bold = true }
select_alt  = { bg = "#41474d", fg = "#c1c7ce" }

# Unset mode
unset_main = { bg = "#d0bfe7", fg = "#362b4a", bold = true }
unset_alt  = { bg = "#41474d", fg = "#c1c7ce" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#567ba2" }
perm_write = { fg = "#7e50bd" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#9943ff" }
perm_sep   = { fg = "#329cff" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#97ccf9", bg = "#363a3e" }
progress_error  = { fg = "#ffb4ab", bg = "#363a3e" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#363a3e" }
cand = { fg = "#97ccf9" }
rest = { fg = "#003450" }
desc = { fg = "#e0e3e8" }
separator = " ▶ "
separator_style = { fg = "#e0e3e8" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#d0bfe7" }
title_warn  = { fg = "#97ccf9" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#97ccf9" }
active = { fg = "#d0bfe7", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#97ccf9" }
value  = { fg = "#e0e3e8" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#97ccf9", bg = "#003450" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#97ccf9" }
title   = {}
hovered = { fg = "#ecdcff", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#e0e3e8" }
run    = { fg = "#e0e3e8" }
footer = { fg = "#22323f", bg = "#b8c8d9" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#e0e3e8" },
    { url = "*/", fg = "#97ccf9" },
]

# : ]]]