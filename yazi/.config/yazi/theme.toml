# : Manager [[[

[mgr]
cwd = { fg = "#f0dede" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#ffb249", bg = "#ffb249" }
marker_cut      = { fg = "#ffddaf", bg = "#ffddaf" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#e5c18d", bg = "#e5c18d" }

# Count
count_copied   = { fg = "#281800", bg = "#ffddaf" }
count_cut      = { fg = "#281800", bg = "#ffddaf" }
count_selected = { fg = "#561d21", bg = "#e5c18d" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffb3b3" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#ffb3b3", bold = true, bg = "#1a1111" }
inactive  = { fg = "#e6bdbc", bg = "#1a1111" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#ffb3b3", fg = "#561d21", bold = true }
normal_alt  = { bg = "#524343", fg = "#d7c1c1" }

# Select mode
select_main = { bg = "#e6bdbc", fg = "#44292a", bold = true }
select_alt  = { bg = "#524343", fg = "#d7c1c1" }

# Unset mode
unset_main = { bg = "#e5c18d", fg = "#422c05", bold = true }
unset_alt  = { bg = "#524343", fg = "#d7c1c1" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#bc4f4d" }
perm_write = { fg = "#b17928" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#ff9c16" }
perm_sep   = { fg = "#ff4540" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#ffb3b3", bg = "#423736" }
progress_error  = { fg = "#ffb4ab", bg = "#423736" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#423736" }
cand = { fg = "#ffb3b3" }
rest = { fg = "#561d21" }
desc = { fg = "#f0dede" }
separator = " ▶ "
separator_style = { fg = "#f0dede" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#e5c18d" }
title_warn  = { fg = "#ffb3b3" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#ffb3b3" }
active = { fg = "#e5c18d", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffb3b3" }
value  = { fg = "#f0dede" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#ffb3b3", bg = "#561d21" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#ffb3b3" }
title   = {}
hovered = { fg = "#ffddaf", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#f0dede" }
run    = { fg = "#f0dede" }
footer = { fg = "#44292a", bg = "#e6bdbc" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#f0dede" },
    { url = "*/", fg = "#ffb3b3" },
]

# : ]]]